<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>smokings cat fame list</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-start: #050505;
            --bg-end: #000000;
            --card-bg: rgba(20, 20, 20, 0.75);
            --card-border: rgba(80, 80, 80, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --input-bg: rgba(30, 30, 30, 0.9);
            --glass-bg: rgba(15, 15, 15, 0.7);
            --accent: #3a3a3a;
            --accent-hover: #5a5a5a;
            --danger: #aa5555;
            --success: #558855;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.light {
            --bg-start: #f8f8f8;
            --bg-end: #f0f0f0;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(100, 100, 100, 0.3);
            --text-primary: #111111;
            --text-secondary: #444444;
            --input-bg: rgba(240, 240, 240, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --accent: #cccccc;
            --accent-hover: #aaaaaa;
            --danger: #cc7777;
            --success: #77aa77;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }
        
        /* Анимированные кубики - двигаются вверх */
        .cubes-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .cube {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(100, 100, 100, 0.08);
            border: 1px solid rgba(100, 100, 100, 0.15);
            animation: floatUp 15s linear infinite;
            bottom: -100px;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .cube:nth-child(1) { left: 5%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 0s; }
        .cube:nth-child(2) { left: 15%; width: 50px; height: 50px; animation-duration: 22s; animation-delay: 2s; }
        .cube:nth-child(3) { left: 25%; width: 100px; height: 100px; animation-duration: 25s; animation-delay: 5s; }
        .cube:nth-child(4) { left: 35%; width: 40px; height: 40px; animation-duration: 15s; animation-delay: 1s; }
        .cube:nth-child(5) { left: 45%; width: 70px; height: 70px; animation-duration: 20s; animation-delay: 3s; }
        .cube:nth-child(6) { left: 55%; width: 90px; height: 90px; animation-duration: 28s; animation-delay: 4s; }
        .cube:nth-child(7) { left: 65%; width: 55px; height: 55px; animation-duration: 17s; animation-delay: 6s; }
        .cube:nth-child(8) { left: 75%; width: 65px; height: 65px; animation-duration: 23s; animation-delay: 0s; }
        .cube:nth-child(9) { left: 85%; width: 45px; height: 45px; animation-duration: 19s; animation-delay: 2s; }
        .cube:nth-child(10) { left: 95%; width: 85px; height: 85px; animation-duration: 26s; animation-delay: 4s; }
        
        .start-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .start-menu.hidden { opacity: 0; visibility: hidden; }
        
        .menu-container { text-align: center; animation: fadeInUp 0.8s ease; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-start {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            color: var(--text-primary);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        
        .start-btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: var(--text-primary);
            border-radius: 60px;
        }
        
        .start-btn:hover { background: var(--text-primary); color: var(--bg-start); transform: scale(1.02); }
        
        .main-content { display: none; opacity: 0; transition: opacity 0.6s ease; }
        .main-content.visible { display: block; opacity: 1; animation: contentFadeIn 0.6s ease; }
        
        @keyframes contentFadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 0.8rem 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 60px;
            gap: 1rem;
        }
        
        .left-group { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        
        .telegram-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            padding: 0.5rem 1.2rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid var(--card-border);
            border-radius: 40px;
        }
        
        .telegram-link i { font-size: 1.3rem; }
        .telegram-link:hover { background: var(--accent); transform: scale(1.02); }
        
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.3s;
        }
        
        .theme-toggle:hover { background: var(--accent); }
        
        .notification-bell {
            position: relative;
            cursor: pointer;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--card-border);
        }
        
        .bell-icon { font-size: 1.2rem; }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .notification-menu {
            position: absolute;
            top: 60px;
            right: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 0.8rem;
            min-width: 260px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid var(--card-border);
            z-index: 1000;
            display: none;
            border-radius: 20px;
        }
        
        .notification-menu.show { display: block; animation: slideDown 0.2s ease; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification-item {
            padding: 0.6rem;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.8rem;
        }
        
        .right-group { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
        
        .admin-btn {
            background: var(--danger);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .admin-btn:hover { background: var(--accent-hover); }
        
        .exit-btn {
            background: var(--danger);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 40px;
            color: var(--text-primary);
        }
        
        .exit-btn:hover { background: var(--accent-hover); }
        
        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        
        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.7rem 1.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 40px;
        }
        
        .tab-btn.active { background: var(--accent); border-color: var(--text-secondary); }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 1.8rem;
            margin-bottom: 2rem;
            border-radius: 32px;
        }
        
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); }
        
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            border-radius: 24px;
        }
        
        .radio-group { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
        .radio-group label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        
        .file-label {
            display: inline-block;
            background: var(--accent);
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 40px;
        }
        
        .avatar-preview {
            margin-top: 0.8rem;
            width: 80px;
            height: 80px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--card-border);
            border-radius: 100%;
        }
        
        button {
            background: var(--accent);
            border: none;
            padding: 0.7rem 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        
        button:hover { background: var(--accent-hover); }
        
        /* Разделы по ролям */
        .role-section {
            margin-bottom: 2rem;
            border: 1px solid var(--card-border);
            border-radius: 28px;
            overflow: hidden;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            animation: sectionFadeIn 0.4s ease;
        }
        
        @keyframes sectionFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section-header {
            background: var(--accent);
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .section-header i { font-size: 1.2rem; }
        
        .section-count {
            background: var(--card-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        
        .section-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            padding: 1.2rem;
        }
        
        .empty-section {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .person-card {
            background: var(--glass-bg);
            backdrop-filter: blur(4px);
            padding: 1rem;
            border-left: 3px solid var(--accent);
            transition: 0.2s;
            cursor: pointer;
            border-radius: 20px;
            position: relative;
        }
        
        .person-card:hover { transform: translateY(-3px); background: var(--accent-hover); }
        
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .person-card:hover .delete-btn {
            opacity: 1;
        }
        
        .delete-btn:hover {
            background: #ff4444;
            transform: scale(1.1);
        }
        
        .avatar-img {
            width: 55px;
            height: 55px;
            background-size: cover;
            background-position: center;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            border-radius: 100%;
            border: 1px solid var(--card-border);
        }
        
        .person-header { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 0.5rem; }
        .person-name { font-size: 1.1rem; font-weight: 600; }
        .role-badge { display: inline-block; padding: 0.2rem 0.8rem; font-size: 0.7rem; background: var(--accent); border-radius: 40px; }
        
        .admin-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .accept-btn { background: var(--success); }
        .reject-btn { background: var(--danger); }
        .hidden { display: none; }
        .empty-message { text-align: center; padding: 2rem; opacity: 0.6; }
        
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        
        .detail-overlay.show { opacity: 1; visibility: visible; }
        
        .detail-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 2rem;
            max-width: 380px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s;
            border-radius: 32px;
        }
        
        .detail-overlay.show .detail-card { transform: scale(1); }
        
        .detail-avatar {
            width: 90px;
            height: 90px;
            border-radius: 100%;
            background-size: cover;
            background-position: center;
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
            border: 1px solid var(--card-border);
        }
        
        .detail-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .detail-link { margin: 1rem 0; padding: 0.6rem; background: var(--input-bg); border-radius: 20px; word-break: break-all; }
        .detail-link a { color: var(--text-primary); }
        .detail-bio { background: var(--input-bg); padding: 0.8rem; margin-top: 0.5rem; text-align: left; font-size: 0.85rem; border-radius: 20px; }
        
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
        }
        
        .modal-content {
            background: var(--card-bg);
            padding: 1.8rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid var(--card-border);
            border-radius: 32px;
        }
        
        footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.5; }
        
        @media (max-width: 680px) {
            .top-bar { flex-direction: column; }
            .left-group, .right-group { width: 100%; justify-content: center; }
            .section-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cubes-bg">
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
</div>

<div id="startMenu" class="start-menu">
    <div class="menu-container">
        <div class="logo-start">🐾 SMOKINGS CAT</div>
        <div class="logo-start" style="font-size: 1.5rem;">FAME LIST</div>
        <button class="start-btn" id="enterBtn">Войти</button>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="top-bar">
            <div class="left-group">
                <a href="https://t.me/thesmokingscat" target="_blank" class="telegram-link">
                    <i class="fab fa-telegram"></i>
                    <span>smokings cat</span>
                </a>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i> <span id="themeText">Тёмная</span>
                </div>
                <div class="notification-bell" id="notificationBell">
                    <i class="fas fa-bell bell-icon"></i>
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </div>
                <div id="notificationMenu" class="notification-menu"></div>
            </div>
            <div class="right-group">
                <button id="adminBtn" class="admin-btn">👑 Админ</button>
                <button id="exitAdminBtn" class="exit-btn hidden">🚪 Выйти</button>
            </div>
        </div>

        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="apply">📝 Подать заявку</button>
            <button class="tab-btn" data-tab="list">👥 Фейм лист</button>
            <button class="tab-btn" data-tab="projects">🚀 Проекты</button>
            <button class="tab-btn admin-tab hidden" data-tab="admin">📋 Заявки</button>
        </div>

        <div id="applyTab" class="tab-content">
            <div class="glass-card">
                <h2>✨ Новая заявка</h2>
                <form id="applicationForm">
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>О себе</label>
                        <textarea id="bio" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Тип заявки</label>
                        <div class="radio-group">
                            <label><input type="radio" name="type" value="человек" checked id="typePerson"> 👤 Человек</label>
                            <label><input type="radio" name="type" value="проект" id="typeProject"> 🚀 Проект</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Кто ты?</label>
                        <select id="role">
                            <option value="медийка">📸 медийка</option>
                            <option value="большой фейм">⭐ большой фейм</option>
                            <option value="средний фейм">🔥 средний фейм</option>
                            <option value="малый фейм">🐾 малый фейм</option>
                            <option value="кодер">💻 кодер</option>
                            <option value="эдитор">🎨 эдитор</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Аватар</label>
                        <input type="file" id="avatarFile" accept="image/*" style="display:none">
                        <button type="button" class="file-label" id="uploadBtn">📸 Загрузить фото</button>
                        <div id="avatarPreview" class="avatar-preview">🐱</div>
                        <input type="hidden" id="avatarData">
                    </div>
                    <div class="form-group">
                        <label>Ссылка</label>
                        <input type="text" id="link" placeholder="https://t.me/...">
                    </div>
                    <button type="submit">🚀 Отправить</button>
                </form>
            </div>
        </div>

        <div id="listTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>👥 Фейм лист — люди</h2>
                <div id="fameListContainer"></div>
            </div>
        </div>

        <div id="projectsTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>🚀 Фейм лист — проекты</h2>
                <div id="projectsContainer"></div>
            </div>
        </div>

        <div id="adminPanel" class="tab-content hidden">
            <div class="glass-card">
                <h2>📬 Заявки на рассмотрение</h2>
                <div id="applicationsList"></div>
            </div>
        </div>

        <footer>smokings cat fame list — твой путь к признанию</footer>
    </div>
</div>

<div id="detailOverlay" class="detail-overlay">
    <div class="detail-card">
        <div id="detailAvatar" class="detail-avatar">🐱</div>
        <div id="detailName" class="detail-name"></div>
        <div id="detailRole" class="role-badge" style="display: inline-block;"></div>
        <div id="detailLink" class="detail-link"></div>
        <div id="detailBio" class="detail-bio"></div>
        <div style="display: flex; gap: 0.8rem; justify-content: center; margin-top: 1rem;">
            <button id="closeDetailBtn">✖ Закрыть</button>
            <button id="deleteDetailBtn" class="hidden" style="background: var(--danger);">🗑 Удалить</button>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let applications = [];
    let fameList = [];
    let projectsList = [];
    let isAdmin = false;
    let notifications = [];
    let currentDetailItem = null;
    let currentDetailType = null;

    const ADMIN_USERNAME = "cwazardbog";
    const ADMIN_PASS = "smokingcwazard$#@!";

    const roleOrder = [
        "владелец", "медийка", "большой фейм", "средний фейм", "малый фейм", "кодер", "эдитор"
    ];
    
    const roleIcons = {
        "владелец": "👑",
        "медийка": "📸",
        "большой фейм": "⭐",
        "средний фейм": "🔥",
        "малый фейм": "🐾",
        "кодер": "💻",
        "эдитор": "🎨"
    };

    function loadData() {
        applications = JSON.parse(localStorage.getItem("sc_apps") || "[]");
        fameList = JSON.parse(localStorage.getItem("sc_fame") || "[]");
        projectsList = JSON.parse(localStorage.getItem("sc_projects") || "[]");
        notifications = JSON.parse(localStorage.getItem("sc_notifications") || "[]");
        const savedAdmin = localStorage.getItem("sc_isAdmin");
        if(savedAdmin === "true") isAdmin = true;
    }
    
    function saveAll() {
        localStorage.setItem("sc_apps", JSON.stringify(applications));
        localStorage.setItem("sc_fame", JSON.stringify(fameList));
        localStorage.setItem("sc_projects", JSON.stringify(projectsList));
        localStorage.setItem("sc_notifications", JSON.stringify(notifications));
        localStorage.setItem("sc_isAdmin", isAdmin ? "true" : "false");
    }

    // Уведомления
    function addNotification(message) {
        notifications.unshift({ message, time: new Date().toLocaleString(), read: false });
        if(notifications.length > 50) notifications.pop();
        saveAll();
        updateNotificationUI();
    }

    function updateNotificationUI() {
        const badge = document.getElementById("notificationBadge");
        const unreadCount = notifications.filter(n => !n.read).length;
        if(unreadCount > 0) {
            badge.classList.remove("hidden");
            badge.textContent = unreadCount;
        } else {
            badge.classList.add("hidden");
        }
        const menu = document.getElementById("notificationMenu");
        if(menu) {
            if(notifications.length === 0) {
                menu.innerHTML = "<div class='notification-item'>📭 Нет уведомлений</div>";
            } else {
                menu.innerHTML = notifications.map(n => `<div class="notification-item">🔔 ${escapeHtml(n.message)}<br><small>${n.time}</small></div>`).join('');
            }
        }
    }

    function markNotificationsRead() {
        notifications.forEach(n => n.read = true);
        saveAll();
        updateNotificationUI();
    }

    // Заявки (теперь админ не принимается автоматически)
    function addApplication(name, bio, type, role, avatar, link) {
        if(!name.trim()) return false;
        
        const newApp = {
            id: Date.now(), name, bio, type, role,
            avatar: avatar || "🐱", link: link || "#", timestamp: new Date().toLocaleString()
        };
        applications.unshift(newApp);
        saveAll();
        return true;
    }

    function acceptApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx === -1) return false;
        const app = applications[idx];
        const entry = { ...app, acceptedAt: new Date().toISOString() };
        delete entry.timestamp;
        if(app.type === "проект") projectsList.push(entry);
        else fameList.push(entry);
        applications.splice(idx,1);
        saveAll();
        addNotification(`✅ Заявка "${app.name}" принята!`);
        return true;
    }

    function rejectApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx !== -1) {
            const app = applications[idx];
            applications.splice(idx,1);
            saveAll();
            addNotification(`❌ Заявка "${app.name}" отклонена`);
            return true;
        }
        return false;
    }
    
    // Удаление карточки (только для админа)
    function deleteCard(id, type) {
        if(!isAdmin) return false;
        if(type === "person") {
            const idx = fameList.findIndex(i => i.id == id);
            if(idx !== -1) {
                const name = fameList[idx].name;
                fameList.splice(idx,1);
                saveAll();
                addNotification(`🗑 Карточка "${name}" удалена админом`);
                return true;
            }
        } else if(type === "project") {
            const idx = projectsList.findIndex(i => i.id == id);
            if(idx !== -1) {
                const name = projectsList[idx].name;
                projectsList.splice(idx,1);
                saveAll();
                addNotification(`🗑 Карточка "${name}" удалена админом`);
                return true;
            }
        }
        return false;
    }

    // Рендер с разделами по ролям (для людей)
    function renderFame() {
        const cont = document.getElementById("fameListContainer");
        if(!cont) return;
        
        const grouped = {};
        roleOrder.forEach(role => { grouped[role] = []; });
        
        fameList.forEach(item => {
            if(grouped[item.role]) grouped[item.role].push(item);
            else grouped[item.role] = [item];
        });
        
        let html = "";
        for(const role of roleOrder) {
            const items = grouped[role] || [];
            if(items.length === 0) continue;
            
            html += `
                <div class="role-section">
                    <div class="section-header">
                        <i>${roleIcons[role] || "🏷️"}</i>
                        <span>${role === "владелец" ? "Владелец" : role}</span>
                        <span class="section-count">${items.length}</span>
                    </div>
                    <div class="section-content">
                        ${items.map(p => `
                            <div class="person-card" data-id="${p.id}" data-type="person">
                                ${isAdmin ? `<button class="delete-btn" data-id="${p.id}" data-type="person">🗑</button>` : ''}
                                <div class="person-header">
                                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '🐱') : ''}
                                    </div>
                                    <div>
                                        <div class="person-name">${escapeHtml(p.name)}</div>
                                        <span class="role-badge">${p.role}</span>
                                    </div>
                                </div>
                                <p>📝 ${escapeHtml(p.bio?.substring(0,60) || '—')}</p>
                                <p>🔗 <a href="${p.link}" target="_blank" onclick="event.stopPropagation();">${p.link.length>30?p.link.substring(0,30)+'...':p.link}</a></p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        if(html === "") html = "<div class='empty-message'>😿 Пока никого нет</div>";
        cont.innerHTML = html;
        
        attachCardEvents("#fameListContainer", "person");
    }

    // Рендер проектов с разделами по ролям
    function renderProjects() {
        const cont = document.getElementById("projectsContainer");
        if(!cont) return;
        
        const grouped = {};
        roleOrder.forEach(role => { grouped[role] = []; });
        
        projectsList.forEach(item => {
            if(grouped[item.role]) grouped[item.role].push(item);
            else grouped[item.role] = [item];
        });
        
        let html = "";
        for(const role of roleOrder) {
            const items = grouped[role] || [];
            if(items.length === 0) continue;
            
            html += `
                <div class="role-section">
                    <div class="section-header">
                        <i>${roleIcons[role] || "🏷️"}</i>
                        <span>${role === "владелец" ? "Владелец" : role}</span>
                        <span class="section-count">${items.length}</span>
                    </div>
                    <div class="section-content">
                        ${items.map(p => `
                            <div class="person-card" data-id="${p.id}" data-type="project">
                                ${isAdmin ? `<button class="delete-btn" data-id="${p.id}" data-type="project">🗑</button>` : ''}
                                <div class="person-header">
                                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '📁') : ''}
                                    </div>
                                    <div>
                                        <div class="person-name">${escapeHtml(p.name)}</div>
                                        <span class="role-badge">${p.role}</span>
                                    </div>
                                </div>
                                <p>📖 ${escapeHtml(p.bio?.substring(0,60) || '—')}</p>
                                <p>🔗 <a href="${p.link}" target="_blank" onclick="event.stopPropagation();">Ссылка</a></p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        if(html === "") html = "<div class='empty-message'>📭 Проектов пока нет</div>";
        cont.innerHTML = html;
        
        attachCardEvents("#projectsContainer", "project");
    }
    
    function attachCardEvents(containerId, type) {
        document.querySelectorAll(`${containerId} .person-card`).forEach(card => {
            const cardId = parseInt(card.dataset.id);
            const cardType = card.dataset.type || type;
            
            // Клик на карточку для детального просмотра
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("delete-btn")) return;
                if(e.target.tagName === 'A') return;
                let item;
                if(cardType === "person") item = fameList.find(p => p.id === cardId);
                else item = projectsList.find(p => p.id === cardId);
                if(item) showDetail(item, cardType);
            });
            
            // Кнопка удаления
            const deleteBtn = card.querySelector(".delete-btn");
            if(deleteBtn) {
                deleteBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if(confirm("Удалить эту карточку?")) {
                        if(deleteCard(cardId, cardType)) {
                            renderFame();
                            renderProjects();
                            toast("Карточка удалена");
                        }
                    }
                });
            }
        });
    }

    function showDetail(item, type) {
        currentDetailItem = item;
        currentDetailType = type;
        
        const overlay = document.getElementById("detailOverlay");
        const avatar = document.getElementById("detailAvatar");
        const name = document.getElementById("detailName");
        const role = document.getElementById("detailRole");
        const link = document.getElementById("detailLink");
        const bio = document.getElementById("detailBio");
        const deleteBtn = document.getElementById("deleteDetailBtn");
        
        if(item.avatar && item.avatar.startsWith('data:')) {
            avatar.style.backgroundImage = `url('${item.avatar}')`;
            avatar.style.backgroundSize = "cover";
            avatar.innerHTML = "";
        } else {
            avatar.style.backgroundImage = "";
            avatar.innerHTML = item.avatar || "🐱";
        }
        name.textContent = item.name;
        role.textContent = item.role;
        link.innerHTML = `<a href="${item.link}" target="_blank">${item.link.length > 50 ? item.link.substring(0,50)+'...' : item.link}</a>`;
        bio.textContent = item.bio || "—";
        
        if(isAdmin) {
            deleteBtn.classList.remove("hidden");
        } else {
            deleteBtn.classList.add("hidden");
        }
        
        overlay.classList.add("show");
    }

    function closeDetail() {
        document.getElementById("detailOverlay").classList.remove("show");
        currentDetailItem = null;
    }
    
    function deleteCurrentDetail() {
        if(currentDetailItem && isAdmin) {
            if(confirm(`Удалить "${currentDetailItem.name}"?`)) {
                if(deleteCard(currentDetailItem.id, currentDetailType)) {
                    renderFame();
                    renderProjects();
                    closeDetail();
                    toast("Карточка удалена");
                }
            }
        }
    }

    function renderAdmin() {
        const cont = document.getElementById("applicationsList");
        if(!cont) return;
        if(!applications.length) { cont.innerHTML = "<div class='empty-message'>✨ Нет заявок</div>"; return; }
        cont.innerHTML = applications.map(a => `
            <div class="person-card" data-id="${a.id}">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${a.avatar && a.avatar.startsWith('data:') ? a.avatar : ''}');">
                        ${(!a.avatar || !a.avatar.startsWith('data:')) ? (a.avatar || '🐾') : ''}
                    </div>
                    <div>
                        <div class="person-name">${escapeHtml(a.name)}</div>
                        <span class="role-badge">${a.role}</span>
                        <span style="font-size:0.7rem; opacity:0.7; margin-left:0.5rem;">${a.type === 'проект' ? '🚀 проект' : '👤 человек'}</span>
                        <div style="font-size:0.7rem; opacity:0.7;">⏳ ожидает</div>
                    </div>
                </div>
                <p>📝 ${escapeHtml(a.bio)}</p>
                <div class="admin-actions" onclick="event.stopPropagation()">
                    <button class="accept-btn" data-id="${a.id}">✅ Принять</button>
                    <button class="reject-btn" data-id="${a.id}">❌ Отклонить</button>
                </div>
            </div>`).join('');
        document.querySelectorAll('.accept-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); if(acceptApplication(btn.dataset.id)) { renderAdmin(); renderFame(); renderProjects(); toast("Принято!"); } };
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); if(rejectApplication(btn.dataset.id)) { renderAdmin(); toast("Отклонено"); } };
        });
    }

    function toast(msg) {
        let t = document.getElementById("toast");
        if(!t) {
            t = document.createElement("div");
            t.id = "toast";
            t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);padding:10px 20px;border-radius:40px;z-index:9999;font-weight:500";
            document.body.appendChild(t);
        }
        t.innerText = msg;
        t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 2000);
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showAdminLogin() {
        const modal = document.createElement("div"); modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>🔐 Вход в админку</h3><input id="adminUser" placeholder="Имя" style="margin:0.5rem 0;width:100%"><input id="adminPass" type="password" placeholder="Пароль" style="margin:0.5rem 0;width:100%"><div style="display:flex;gap:1rem"><button id="loginAdminBtn">Войти</button><button id="closeModalBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginAdminBtn").onclick = () => {
            const u = document.getElementById("adminUser").value;
            const p = document.getElementById("adminPass").value;
            if(u === ADMIN_USERNAME && p === ADMIN_PASS) {
                isAdmin = true;
                saveAll();
                modal.remove();
                location.reload();
            } else { toast("Неверные данные!"); modal.remove(); }
        };
        document.getElementById("closeModalBtn").onclick = () => modal.remove();
    }

    function exitAdmin() {
        isAdmin = false;
        localStorage.removeItem("sc_isAdmin");
        location.reload();
    }

    function updateAdminUI() {
        const adminBtn = document.getElementById("adminBtn");
        const exitBtn = document.getElementById("exitAdminBtn");
        const adminTab = document.querySelector(".admin-tab");
        const roleSelect = document.getElementById("role");
        
        if(isAdmin) {
            adminBtn.classList.add("hidden");
            exitBtn.classList.remove("hidden");
            if(adminTab) adminTab.classList.remove("hidden");
            if(roleSelect && !Array.from(roleSelect.options).some(o => o.value === "владелец")) {
                const option = document.createElement("option");
                option.value = "владелец";
                option.textContent = "👑 владелец";
                roleSelect.appendChild(option);
            }
        } else {
            adminBtn.classList.remove("hidden");
            exitBtn.classList.add("hidden");
            if(adminTab) adminTab.classList.add("hidden");
            if(roleSelect) {
                for(let i = 0; i < roleSelect.options.length; i++) {
                    if(roleSelect.options[i].value === "владелец") {
                        roleSelect.remove(i);
                        break;
                    }
                }
            }
        }
    }

    function initRoleFilter() {
        const typePerson = document.getElementById("typePerson");
        const typeProject = document.getElementById("typeProject");
        const roleSelect = document.getElementById("role");
        
        function filterRoles() {
            const isProject = typeProject.checked;
            for(let i = 0; i < roleSelect.options.length; i++) {
                const val = roleSelect.options[i].value;
                if(val === "кодер" || val === "эдитор") {
                    roleSelect.options[i].style.display = isProject ? "none" : "";
                }
            }
            if(isProject && (roleSelect.value === "кодер" || roleSelect.value === "эдитор")) {
                for(let i = 0; i < roleSelect.options.length; i++) {
                    if(roleSelect.options[i].style.display !== "none") {
                        roleSelect.value = roleSelect.options[i].value;
                        break;
                    }
                }
            }
        }
        
        typePerson.addEventListener("change", filterRoles);
        typeProject.addEventListener("change", filterRoles);
        filterRoles();
    }

    let currentTab = "apply";
    function showTab(tab) {
        document.getElementById("applyTab").classList.add("hidden");
        document.getElementById("listTab").classList.add("hidden");
        document.getElementById("projectsTab").classList.add("hidden");
        document.getElementById("adminPanel").classList.add("hidden");
        
        if(tab === "apply") document.getElementById("applyTab").classList.remove("hidden");
        if(tab === "list") document.getElementById("listTab").classList.remove("hidden");
        if(tab === "projects") document.getElementById("projectsTab").classList.remove("hidden");
        if(tab === "admin" && isAdmin) document.getElementById("adminPanel").classList.remove("hidden");
        
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        if(tab === "apply") document.querySelector("[data-tab='apply']").classList.add("active");
        if(tab === "list") document.querySelector("[data-tab='list']").classList.add("active");
        if(tab === "projects") document.querySelector("[data-tab='projects']").classList.add("active");
        if(tab === "admin" && isAdmin) document.querySelector("[data-tab='admin']").classList.add("active");
        currentTab = tab;
    }

    let isDark = true;
    function initTheme() {
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme === "light") {
            isDark = false;
            document.body.classList.add("light");
            document.getElementById("themeText").innerHTML = "Светлая";
        } else {
            isDark = true;
            document.body.classList.remove("light");
            document.getElementById("themeText").innerHTML = "Тёмная";
        }
    }
    
    function toggleTheme() {
        isDark = !isDark;
        if(isDark) {
            document.body.classList.remove("light");
            localStorage.setItem("theme", "dark");
            document.getElementById("themeText").innerHTML = "Тёмная";
        } else {
            document.body.classList.add("light");
            localStorage.setItem("theme", "light");
            document.getElementById("themeText").innerHTML = "Светлая";
        }
    }

    let currentAvatar = "";
    document.getElementById("uploadBtn").onclick = () => document.getElementById("avatarFile").click();
    document.getElementById("avatarFile").onchange = function(e) {
        const f = e.target.files[0];
        if(f && f.type.startsWith("image/")) {
            const r = new FileReader();
            r.onload = ev => {
                currentAvatar = ev.target.result;
                const preview = document.getElementById("avatarPreview");
                preview.style.backgroundImage = `url('${currentAvatar}')`;
                preview.style.backgroundSize = "cover";
                preview.innerHTML = "";
                document.getElementById("avatarData").value = currentAvatar;
            };
            r.readAsDataURL(f);
        }
    };

    document.getElementById("applicationForm").onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const bio = document.getElementById("bio").value;
        const type = document.querySelector('input[name="type"]:checked').value;
        const role = document.getElementById("role").value;
        const avatar = document.getElementById("avatarData").value;
        const link = document.getElementById("link").value;
        if(!name.trim()) { toast("Введите имя"); return; }
        
        if(addApplication(name, bio, type, role, avatar || "🐱", link)) {
            document.getElementById("applicationForm").reset();
            document.getElementById("avatarPreview").innerHTML = "🐱";
            document.getElementById("avatarPreview").style.backgroundImage = "";
            document.getElementById("avatarData").value = "";
            currentAvatar = "";
            renderFame();
            renderProjects();
            if(isAdmin) renderAdmin();
            toast("✅ Заявка отправлена на рассмотрение!");
        } else toast("Ошибка");
    };

    document.getElementById("enterBtn").onclick = () => {
        document.getElementById("startMenu").classList.add("hidden");
        document.getElementById("mainContent").classList.add("visible");
        loadData();
        renderFame();
        renderProjects();
        if(isAdmin) renderAdmin();
        updateAdminUI();
        showTab("apply");
        initRoleFilter();
    };
    
    document.getElementById("adminBtn").onclick = () => { showAdminLogin(); };
    document.getElementById("exitAdminBtn").onclick = () => { exitAdmin(); };
    document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { 
            if(btn.dataset.tab === "admin" && !isAdmin) { toast("Доступ только для админа"); return; } 
            showTab(btn.dataset.tab); 
        };
    });
    document.getElementById("closeDetailBtn").onclick = closeDetail;
    document.getElementById("deleteDetailBtn").onclick = deleteCurrentDetail;
    document.getElementById("detailOverlay").onclick = (e) => { if(e.target === document.getElementById("detailOverlay")) closeDetail(); };
    document.getElementById("themeToggle").onclick = toggleTheme;
    
    let bellTimeout;
    document.getElementById("notificationBell").onclick = () => {
        const menu = document.getElementById("notificationMenu");
        menu.classList.toggle("show");
        if(menu.classList.contains("show")) {
            markNotificationsRead();
            if(bellTimeout) clearTimeout(bellTimeout);
            bellTimeout = setTimeout(() => menu.classList.remove("show"), 5000);
        }
    };
    document.addEventListener("click", (e) => {
        if(!document.getElementById("notificationBell").contains(e.target) && !document.getElementById("notificationMenu").contains(e.target)) {
            document.getElementById("notificationMenu").classList.remove("show");
        }
    });

    loadData();
    initTheme();
    updateAdminUI();
    updateNotificationUI();
    initRoleFilter();
</script>
</body>
