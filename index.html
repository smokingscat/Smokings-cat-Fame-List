<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>smokings cat fame list</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0c0c1f, #02020a);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            animation: rotate 40s linear infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            animation: rotate 30s linear infinite reverse;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .start-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .start-menu.hidden { opacity: 0; visibility: hidden; }
        .menu-container { text-align: center; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-start {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            font-family: 'Orbitron', monospace;
        }
        .start-buttons { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
        .start-btn {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: rgba(20, 20, 45, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(139, 92, 246, 0.5);
        }
        .start-btn.owner { background: linear-gradient(135deg, #8b5cf6, #6366f1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        .start-btn.guest { background: linear-gradient(135deg, #1e1e3a, #2d2d5a); }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(139, 92, 246, 0.6); }
        .main-content { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .main-content.visible { display: block; opacity: 1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 0.5rem 1rem;
            background: rgba(15, 15, 35, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .telegram-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #3b82f6;
        }
        .telegram-link i { font-size: 1.8rem; color: #26A5E4; }
        .telegram-link:hover { transform: scale(1.02); box-shadow: 0 0 15px #26A5E4; }
        .owner-top-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .owner-top-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px #ef4444; }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .tab-btn {
            background: rgba(20, 20, 45, 0.7);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .tab-btn.active { background: linear-gradient(135deg, #8b5cf6, #3b82f6); color: white; box-shadow: 0 0 20px #8b5cf6; }
        .glass-card {
            background: rgba(15, 15, 35, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(120, 80, 255, 0.3);
            padding: 1.8rem;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #cbd5ff; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #4f46e5;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .radio-group { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
        .radio-group label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .file-label {
            display: inline-block;
            background: linear-gradient(95deg, #7c3aed, #3b82f6);
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .avatar-preview {
            margin-top: 0.8rem;
            width: 80px;
            height: 80px;
            border-radius: 100%;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background-size: cover;
            background-position: center;
            border: 2px solid #a855f7;
        }
        button {
            background: linear-gradient(95deg, #7c3aed, #3b82f6);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .fame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1.5rem; }
        .person-card {
            background: rgba(25, 25, 50, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border-left: 5px solid #a855f7;
            transition: 0.2s;
        }
        .person-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); }
        .avatar-img {
            width: 70px;
            height: 70px;
            border-radius: 100%;
            background-size: cover;
            background-position: center;
            background-color: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .person-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.7rem; }
        .role-badge { display: inline-block; padding: 0.2rem 1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: bold; background: #2d2d5e; }
        .type-badge { display: inline-block; padding: 0.2rem 0.8rem; border-radius: 2rem; font-size: 0.7rem; background: #3b82f6; margin-left: 0.5rem; }
        .admin-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .accept-btn { background: #10b981; }
        .reject-btn { background: #ef4444; }
        .hidden { display: none; }
        .empty-message { text-align: center; padding: 2rem; opacity: 0.7; }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #14142b;
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #8b5cf6;
        }
        footer { text-align: center; margin-top: 3rem; font-size: 0.8rem; opacity: 0.5; }
        @media (max-width: 680px) {
            .start-buttons { flex-direction: column; gap: 1rem; }
            .top-bar { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>

<div id="startMenu" class="start-menu">
    <div class="menu-container">
        <div class="logo-start">🐾 SMOKINGS CAT</div>
        <div class="logo-start" style="font-size: 1.5rem;">FAME LIST</div>
        <div class="start-buttons">
            <button class="start-btn owner" id="ownerStartBtn">👑 Я ВЛАДЕЛЕЦ</button>
            <button class="start-btn guest" id="guestStartBtn">🐱 Я НЕ ВЛАДЕЛЕЦ</button>
        </div>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="top-bar">
            <a href="https://t.me/thesmokingscat" target="_blank" class="telegram-link">
                <i class="fab fa-telegram"></i>
                <span>smokings cat</span>
            </a>
            <button id="floatingOwnerBtn" class="owner-top-btn">👑 Вход владельца</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="apply">📝 Подать заявку</button>
            <button class="tab-btn" data-tab="list">👥 Фейм лист</button>
            <button class="tab-btn" data-tab="projects">🚀 Проекты</button>
        </div>

        <div id="applyTab" class="tab-content">
            <div class="glass-card">
                <h2>✨ Новая заявка</h2>
                <form id="applicationForm">
                    <div class="form-group">
                        <label>Имя *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>О себе</label>
                        <textarea id="bio" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Тип заявки</label>
                        <div class="radio-group">
                            <label><input type="radio" name="type" value="человек" checked> 👤 Человек</label>
                            <label><input type="radio" name="type" value="проект"> 🚀 Проект</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Кто ты?</label>
                        <select id="role">
                            <option value="медийка">📸 медийка</option>
                            <option value="большой фейм">⭐ большой фейм</option>
                            <option value="средний фейм">🔥 средний фейм</option>
                            <option value="малый фейм">🐾 малый фейм</option>
                            <option value="кодер">💻 кодер</option>
                            <option value="эдитор">🎨 эдитор</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Аватар</label>
                        <input type="file" id="avatarFile" accept="image/*" style="display:none">
                        <button type="button" class="file-label" id="uploadBtn">📸 Загрузить фото</button>
                        <div id="avatarPreview" class="avatar-preview">🐱</div>
                        <input type="hidden" id="avatarData">
                    </div>
                    <div class="form-group">
                        <label>Ссылка</label>
                        <input type="text" id="link" placeholder="https://t.me/...">
                    </div>
                    <button type="submit">🚀 Отправить</button>
                </form>
            </div>
        </div>

        <div id="listTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>👥 Фейм лист — люди</h2>
                <div id="fameListContainer" class="fame-grid"></div>
            </div>
        </div>

        <div id="projectsTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>🚀 Фейм лист — проекты</h2>
                <div id="projectsContainer" class="fame-grid"></div>
            </div>
        </div>

        <div id="adminPanel" class="tab-content hidden">
            <div class="glass-card">
                <h2>📬 Заявки на рассмотрение</h2>
                <div id="applicationsList"></div>
            </div>
        </div>
        <footer>smokings cat fame list — твой путь к признанию</footer>
    </div>
</div>

<script>
    let applications = [];
    let fameList = [];
    let projectsList = [];
    let isOwner = false;

    const OWNER_USERNAME = "cwazardbog";
    const OWNER_PASS = "smokingcwazard$#@!";

    const roleOrder = {
        "владелец": 1, "медийка": 2, "большой фейм": 3,
        "средний фейм": 4, "малый фейм": 5, "кодер": 6, "эдитор": 7
    };

    function loadData() {
        applications = JSON.parse(localStorage.getItem("sc_apps") || "[]");
        fameList = JSON.parse(localStorage.getItem("sc_fame") || "[]");
        projectsList = JSON.parse(localStorage.getItem("sc_projects") || "[]");
    }
    function saveAll() {
        localStorage.setItem("sc_apps", JSON.stringify(applications));
        localStorage.setItem("sc_fame", JSON.stringify(fameList));
        localStorage.setItem("sc_projects", JSON.stringify(projectsList));
    }

    // Автопринятие для владельца
    function addApplicationAuto(name, bio, type, role, avatar, link) {
        if(!name.trim()) return false;
        const newEntry = {
            id: Date.now(), name, bio, type, role,
            avatar: avatar || "🐱", link: link || "#", acceptedAt: new Date().toISOString()
        };
        if(type === "проект") {
            projectsList.push(newEntry);
        } else {
            fameList.push(newEntry);
        }
        saveAll();
        return true;
    }

    function addApplicationPending(name, bio, type, role, avatar, link) {
        if(!name.trim()) return false;
        applications.unshift({
            id: Date.now(), name, bio, type, role,
            avatar: avatar || "🐱", link: link || "#", timestamp: new Date().toLocaleString()
        });
        saveAll();
        return true;
    }

    function acceptApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx === -1) return false;
        const app = applications[idx];
        const entry = { ...app, acceptedAt: new Date().toISOString() };
        delete entry.timestamp;
        if(app.type === "проект") {
            projectsList.push(entry);
        } else {
            fameList.push(entry);
        }
        applications.splice(idx,1);
        saveAll();
        return true;
    }

    function rejectApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx !== -1) { applications.splice(idx,1); saveAll(); return true; }
        return false;
    }

    function sortByRole(list) {
        return [...list].sort((a,b) => (roleOrder[a.role]||99) - (roleOrder[b.role]||99));
    }

    function renderFame() {
        const cont = document.getElementById("fameListContainer");
        if(!cont) return;
        const sorted = sortByRole(fameList);
        if(!sorted.length) { cont.innerHTML = "<div class='empty-message'>😿 Пока никого нет</div>"; return; }
        cont.innerHTML = sorted.map(p => `
            <div class="person-card">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '🐱') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(p.name)}</div>
                    <div><span class="role-badge">${p.role}</span><span class="type-badge">👤 человек</span></div></div>
                </div>
                <p>📝 ${escapeHtml(p.bio?.substring(0,100) || '—')}</p>
                <p>🔗 <a href="${p.link}" target="_blank" style="color:#a78bfa;">${p.link.length>35?p.link.substring(0,35)+'...':p.link}</a></p>
            </div>`).join('');
    }

    function renderProjects() {
        const cont = document.getElementById("projectsContainer");
        if(!cont) return;
        const sorted = sortByRole(projectsList);
        if(!sorted.length) { cont.innerHTML = "<div class='empty-message'>📭 Проектов пока нет</div>"; return; }
        cont.innerHTML = sorted.map(p => `
            <div class="person-card">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '📁') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(p.name)}</div>
                    <div><span class="role-badge">${p.role}</span><span class="type-badge">🚀 проект</span></div></div>
                </div>
                <p>📖 ${escapeHtml(p.bio?.substring(0,100) || '—')}</p>
                <p>🔗 <a href="${p.link}" target="_blank" style="color:#a78bfa;">Ссылка</a></p>
            </div>`).join('');
    }

    function renderAdmin() {
        const cont = document.getElementById("applicationsList");
        if(!cont) return;
        if(!applications.length) { cont.innerHTML = "<div class='empty-message'>✨ Нет заявок</div>"; return; }
        cont.innerHTML = applications.map(a => `
            <div class="person-card">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${a.avatar && a.avatar.startsWith('data:') ? a.avatar : ''}');">
                        ${(!a.avatar || !a.avatar.startsWith('data:')) ? (a.avatar || '🐾') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(a.name)}</div>
                    <span class="role-badge">${a.role}</span><span class="type-badge">${a.type === 'проект' ? '🚀 проект' : '👤 человек'}</span>
                    <div class="status-pending">⏳ ожидает</div></div>
                </div>
                <p>📝 ${escapeHtml(a.bio)}</p>
                <div class="admin-actions">
                    <button class="accept-btn" data-id="${a.id}">✅ Принять</button>
                    <button class="reject-btn" data-id="${a.id}">❌ Отклонить</button>
                </div>
            </div>`).join('');
        document.querySelectorAll('.accept-btn').forEach(btn => {
            btn.onclick = () => { if(acceptApplication(btn.dataset.id)) { renderAdmin(); renderFame(); renderProjects(); toast("Принято!"); } };
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.onclick = () => { if(rejectApplication(btn.dataset.id)) { renderAdmin(); toast("Отклонено"); } };
        });
    }

    function toast(msg) {
        let t = document.getElementById("toast");
        if(!t) { t = document.createElement("div"); t.id = "toast"; t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#8b5cf6;padding:12px 24px;border-radius:40px;z-index:9999;font-weight:bold"; document.body.appendChild(t); }
        t.innerText = msg; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 2000);
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showOwnerLogin() {
        const modal = document.createElement("div"); modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>🔐 Вход владельца</h3><input id="ownerUser" placeholder="Имя" style="margin:0.5rem 0;width:100%"><input id="ownerPass" type="password" placeholder="Пароль" style="margin:0.5rem 0;width:100%"><div style="display:flex;gap:1rem"><button id="loginOwnerBtn">Войти</button><button id="closeModalBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginOwnerBtn").onclick = () => {
            const u = document.getElementById("ownerUser").value;
            const p = document.getElementById("ownerPass").value;
            if(u === OWNER_USERNAME && p === OWNER_PASS) {
                isOwner = true;
                modal.remove();
                showTab("admin");
                renderAdmin();
                toast("Добро пожаловать, владелец!");
                updateRoleSelect();
            } else { toast("Неверные данные!"); modal.remove(); }
        };
        document.getElementById("closeModalBtn").onclick = () => modal.remove();
    }

    // Обновление списка ролей (добавляем "владелец" для владельца)
    function updateRoleSelect() {
        const roleSelect = document.getElementById("role");
        if(!roleSelect) return;
        const options = roleSelect.innerHTML;
        if(isOwner && !options.includes('владелец')) {
            const option = document.createElement("option");
            option.value = "владелец";
            option.textContent = "👑 владелец";
            roleSelect.appendChild(option);
        } else if(!isOwner && options.includes('владелец')) {
            for(let i = 0; i < roleSelect.options.length; i++) {
                if(roleSelect.options[i].value === "владелец") {
                    roleSelect.remove(i);
                    break;
                }
            }
        }
    }

    let currentTab = "apply";
    function showTab(tab) {
        document.getElementById("applyTab").classList.add("hidden");
        document.getElementById("listTab").classList.add("hidden");
        document.getElementById("projectsTab").classList.add("hidden");
        document.getElementById("adminPanel").classList.add("hidden");
        if(tab === "apply") document.getElementById("applyTab").classList.remove("hidden");
        if(tab === "list") document.getElementById("listTab").classList.remove("hidden");
        if(tab === "projects") document.getElementById("projectsTab").classList.remove("hidden");
        if(tab === "admin" && isOwner) document.getElementById("adminPanel").classList.remove("hidden");
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        if(tab === "apply") document.querySelector("[data-tab='apply']").classList.add("active");
        if(tab === "list") document.querySelector("[data-tab='list']").classList.add("active");
        if(tab === "projects") document.querySelector("[data-tab='projects']").classList.add("active");
        currentTab = tab;
    }

    let currentAvatar = "";
    document.getElementById("uploadBtn").onclick = () => document.getElementById("avatarFile").click();
    document.getElementById("avatarFile").onchange = function(e) {
        const f = e.target.files[0];
        if(f && f.type.startsWith("image/")) {
            const r = new FileReader();
            r.onload = ev => { currentAvatar = ev.target.result; document.getElementById("avatarPreview").style.backgroundImage = `url('${currentAvatar}')`; document.getElementById("avatarPreview").style.backgroundSize = "cover"; document.getElementById("avatarPreview").innerHTML = ""; document.getElementById("avatarData").value = currentAvatar; };
            r.readAsDataURL(f);
        }
    };

    document.getElementById("applicationForm").onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const bio = document.getElementById("bio").value;
        const type = document.querySelector('input[name="type"]:checked').value;
        let role = document.getElementById("role").value;
        const avatar = document.getElementById("avatarData").value;
        const link = document.getElementById("link").value;
        if(!name.trim()) { toast("Введите имя"); return; }
        
        // Если владелец выбрал роль "владелец" — автоматически принимаем
        if(isOwner && role === "владелец") {
            if(addApplicationAuto(name, bio, type, role, avatar || "🐱", link)) {
                document.getElementById("applicationForm").reset();
                document.getElementById("avatarPreview").innerHTML = "🐱";
                document.getElementById("avatarPreview").style.backgroundImage = "";
                document.getElementById("avatarData").value = "";
                currentAvatar = "";
                renderFame();
                renderProjects();
                toast("✅ Заявка с ролью ВЛАДЕЛЕЦ автоматически принята!");
            } else toast("Ошибка");
        } else {
            if(addApplicationPending(name, bio, type, role, avatar || "🐱", link)) {
                document.getElementById("applicationForm").reset();
                document.getElementById("avatarPreview").innerHTML = "🐱";
                document.getElementById("avatarPreview").style.backgroundImage = "";
                document.getElementById("avatarData").value = "";
                currentAvatar = "";
                if(isOwner) renderAdmin();
                toast("✅ Заявка отправлена на рассмотрение!");
            } else toast("Ошибка");
        }
    };

    document.getElementById("ownerStartBtn").onclick = () => { showOwnerLogin(); };
    document.getElementById("guestStartBtn").onclick = () => {
        document.getElementById("startMenu").classList.add("hidden");
        document.getElementById("mainContent").classList.add("visible");
        loadData();
        renderFame();
        renderProjects();
        updateRoleSelect();
    };
    document.getElementById("floatingOwnerBtn").onclick = () => { if(isOwner) { isOwner=false; showTab(currentTab); updateRoleSelect(); toast("Выход из режима владельца"); } else showOwnerLogin(); };
    document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { if(btn.dataset.tab === "admin" && !isOwner) { showOwnerLogin(); return; } showTab(btn.dataset.tab); };
    });

    loadData();
    updateRoleSelect();
</script>
</body>
  </html>
