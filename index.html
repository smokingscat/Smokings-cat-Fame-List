<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>smokings cat fame list</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0c0c1f, #02020a);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            animation: rotate 40s linear infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            animation: rotate 30s linear infinite reverse;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .start-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .start-menu.hidden { opacity: 0; visibility: hidden; }
        .menu-container { text-align: center; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-start {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            font-family: 'Orbitron', monospace;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 5px rgba(139,92,246,0.5); }
            to { text-shadow: 0 0 25px rgba(139,92,246,0.9); }
        }
        .start-buttons { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
        .start-btn {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: rgba(20, 20, 45, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(139, 92, 246, 0.5);
            position: relative;
            overflow: hidden;
            border-radius: 60px;
        }
        .start-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .start-btn:hover::before { width: 300px; height: 300px; }
        .start-btn.owner { background: linear-gradient(135deg, #8b5cf6, #6366f1); box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        .start-btn.guest { background: linear-gradient(135deg, #1e1e3a, #2d2d5a); }
        .start-btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 0 30px rgba(139, 92, 246, 0.8); }
        .main-content { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .main-content.visible { display: block; opacity: 1; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 0.5rem 1rem;
            background: rgba(15, 15, 35, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            gap: 1rem;
            border-radius: 80px;
        }
        .left-group { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .telegram-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #3b82f6;
            border-radius: 50px;
        }
        .telegram-link i { font-size: 1.8rem; color: #26A5E4; }
        .telegram-link:hover { transform: scale(1.02); box-shadow: 0 0 15px #26A5E4; }
        .notification-bell {
            position: relative;
            cursor: pointer;
            background: rgba(20,20,45,0.7);
            padding: 0.6rem 1rem;
            transition: 0.3s;
            border-radius: 50px;
        }
        .notification-bell:hover { background: rgba(139,92,246,0.3); transform: scale(1.02); }
        .bell-icon { font-size: 1.5rem; color: #fff; }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 100%;
        }
        .notification-menu {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(20,20,45,0.95);
            backdrop-filter: blur(12px);
            padding: 1rem;
            min-width: 280px;
            max-width: 350px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #8b5cf6;
            z-index: 1000;
            display: none;
            border-radius: 20px;
        }
        .notification-menu.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .notification-item {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(139,92,246,0.3);
            font-size: 0.85rem;
            color: #ddd;
        }
        .right-group { display: flex; align-items: center; gap: 1rem; }
        .owner-top-btn, .my-applications-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 0.7rem 1.5rem;
            font-weight: bold;

            transition: 0.3s;

        .my-applications-btn { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .owner-top-btn:hover, .my-applications-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px #ef4444; }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .tab-btn {
            background: rgba(20, 20, 45, 0.7);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s;

        .glass-card {
            background: rgba(15, 15, 35, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 80, 255, 0.3);
            padding: 1.8rem;
            margin-bottom: 2rem;

        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #cbd5ff; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #4f46e5;
            color: white;
            font-size: 1rem;
            outline: none;
            border-radius: 24px;
        }
        input:focus, select:focus, textarea:focus { border-color: #c084fc; box-shadow: 0 0 10px #a855f7; }
        .radio-group { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
        .radio-group label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .file-label {
            display: inline-block;
            background: linear-gradient(95deg, #7c3aed, #3b82f6);
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 40px;
        }
        .avatar-preview {
            margin-top: 0.8rem;
            width: 80px;
            height: 80px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background-size: cover;
            background-position: center;
            border: 2px solid #a855f7;
            border-radius: 100%;
        }
        button {
            background: linear-gradient(95deg, #7c3aed, #3b82f6);

            padding: 0.8rem 1.5rem;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
            border-radius: 40px;

        button:active { transform: scale(0.97); }
        .fame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1.5rem; }
        .person-card {
            background: rgba(25, 25, 50, 0.7);
            backdrop-filter: blur(4px);
            padding: 1.2rem;
            border-left: 5px solid #a855f7;
            transition: 0.2s;

            animation: cardFadeIn 0.5s ease;

            from { opacity: 0; transform: translateY(20px); }

        }
        .person-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); }
        .avatar-img {
            width: 70px;
            height: 70px;
            background-size: cover;
            background-position: center;
            background-color: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 100%;

        .person-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.7rem; }
        .role-badge { display: inline-block; padding: 0.2rem 1rem; font-size: 0.75rem; font-weight: bold; background: #2d2d5e; border-radius: 40px; }
        .type-badge { display: inline-block; padding: 0.2rem 0.8rem; font-size: 0.7rem; background: #3b82f6; margin-left: 0.5rem; border-radius: 40px; }
        .status-badge { display: inline-block; padding: 0.2rem 0.8rem; font-size: 0.7rem; margin-left: 0.5rem; border-radius: 40px; }
        .status-accepted { background: #10b981; }
        .status-pending { background: #f59e0b; }
        .admin-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .accept-btn { background: #10b981; }
        .reject-btn { background: #ef4444; }
        .hidden { display: none; }
        .empty-message { text-align: center; padding: 2rem; opacity: 0.7; }
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 4000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .detail-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .detail-card {
            background: linear-gradient(135deg, #1a1a3a, #0f0f2a);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 32px;
        }
        .detail-overlay.show .detail-card {
            transform: scale(1);
        }
        .detail-avatar {
            width: 100px;
            height: 100px;
            border-radius: 100%;
            background-size: cover;
            background-position: center;
            background-color: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
            border: 3px solid #a855f7;
        }
        .detail-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .detail-role {
            display: inline-block;
            padding: 0.3rem 1.2rem;
            background: #2d2d5e;
            margin-bottom: 1rem;
            border-radius: 40px;
        }
        .detail-link {
            margin: 1rem 0;
            padding: 0.8rem;
            background: rgba(59,130,246,0.2);
            border-radius: 20px;
            word-break: break-all;
        }
        .detail-link a { color: #60a5fa; text-decoration: none; }
        .detail-bio {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            margin-top: 0.5rem;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.4;
            border-radius: 20px;
        }
        .close-detail-btn {
            margin-top: 1.5rem;
            background: linear-gradient(95deg, #ef4444, #dc2626);
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #14142b;
            padding: 2rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #8b5cf6;
            border-radius: 32px;
        }
        footer { text-align: center; margin-top: 3rem; font-size: 0.8rem; opacity: 0.5; }
        @media (max-width: 680px) {
            .start-buttons { flex-direction: column; gap: 1rem; }
            .top-bar { flex-direction: column; }
            .left-group, .right-group { width: 100%; justify-content: center; }
            .detail-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>

<div id="startMenu" class="start-menu">
    <div class="menu-container">
        <div class="logo-start">🐾 SMOKINGS CAT</div>
        <div class="logo-start" style="font-size: 1.5rem;">FAME LIST</div>
        <div class="start-buttons">
            <button class="start-btn owner" id="ownerStartBtn">👑 ВЛАДЕЛЕЦ</button>
            <button class="start-btn guest" id="guestStartBtn">🐱 ГОСТЬ</button>

    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">
        <div class="top-bar">
            <div class="left-group">
                <a href="https://t.me/thesmokingscat" target="_blank" class="telegram-link">
                    <i class="fab fa-telegram"></i>
                    <span>smokings cat</span>
                </a>
                <div class="notification-bell" id="notificationBell">
                    <i class="fas fa-bell bell-icon"></i>
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </div>
                <div id="notificationMenu" class="notification-menu"></div>
            </div>
            <div class="right-group">
                <button id="myAppsBtn" class="my-applications-btn">📋 Мои заявки</button>
                <button id="floatingOwnerBtn" class="owner-top-btn">👑 Владелец</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="apply">📝 Подать заявку</button>
            <button class="tab-btn" data-tab="list">👥 Фейм лист</button>
            <button class="tab-btn" data-tab="projects">🚀 Проекты</button>
        </div>

        <div id="applyTab" class="tab-content">
            <div class="glass-card">
                <h2>✨ Новая заявка</h2>
                <form id="applicationForm">
                    <div class="form-group">
                        <label>Имя *</label>

                    </div>
                    <div class="form-group">
                        <label>О себе</label>

                    <div class="form-group">

                    </div>
                    <div class="form-group">
                        <label>Кто ты?</label>
                        <select id="role">
                            <option value="медийка">📸 медийка</option>
                            <option value="большой фейм">⭐ большой фейм</option>
                            <option value="средний фейм">🔥 средний фейм</option>
                            <option value="малый фейм">🐾 малый фейм</option>

                        <label>Ссылка</label>
                        <input type="text" id="link" placeholder="https://t.me/...">

                    <button type="submit">🚀 Отправить</button>
                </form>

        <div id="listTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>👥 Фейм лист — люди</h2>
                <div id="fameListContainer" class="fame-grid"></div>
            </div>
        </div>

        <div id="projectsTab" class="tab-content hidden">
            <div class="glass-card">
                <h2>🚀 Фейм лист — проекты</h2>
                <div id="projectsContainer" class="fame-grid"></div>
            </div>
        </div>

        <div id="adminPanel" class="tab-content hidden">
            <div class="glass-card">
                <h2>📬 Заявки на рассмотрение</h2>
                <div id="applicationsList"></div>
            </div>

        <div id="myApplicationsModal" class="modal hidden">
            <div class="modal-content">
                <h3>📋 Мои заявки</h3>
                <div id="myApplicationsList" style="max-height: 400px; overflow-y: auto; margin: 1rem 0;"></div>
                <button id="closeMyAppsModal">Закрыть</button>

</div>

<div id="detailOverlay" class="detail-overlay">
    <div class="detail-card">
        <div id="detailAvatar" class="detail-avatar">🐱</div>
        <div id="detailName" class="detail-name"></div>
        <div id="detailRole" class="detail-role role-badge"></div>
        <div id="detailLink" class="detail-link"></div>
        <div id="detailBio" class="detail-bio"></div>
        <button id="closeDetailBtn" class="close-detail-btn">✖ Закрыть</button>
    </div>
</div>

<script>
    let applications = [];
    let fameList = [];
    let projectsList = [];
    let isOwner = false;
    let currentUser = null;
    let notifications = [];

    const OWNER_USERNAME = "cwazardbog";
    const OWNER_PASS = "smokingcwazard$#@!";

    const roleOrder = {
        "владелец": 1, "медийка": 2, "большой фейм": 3,
        "средний фейм": 4, "малый фейм": 5, "кодер": 6, "эдитор": 7
    };

    function loadData() {
        applications = JSON.parse(localStorage.getItem("sc_apps") || "[]");
        fameList = JSON.parse(localStorage.getItem("sc_fame") || "[]");
        projectsList = JSON.parse(localStorage.getItem("sc_projects") || "[]");
        notifications = JSON.parse(localStorage.getItem("sc_notifications") || "[]");
        const savedUser = localStorage.getItem("sc_currentUser");
        if(savedUser) currentUser = savedUser;
    }
    function saveAll() {
        localStorage.setItem("sc_apps", JSON.stringify(applications));
        localStorage.setItem("sc_fame", JSON.stringify(fameList));
        localStorage.setItem("sc_projects", JSON.stringify(projectsList));
        localStorage.setItem("sc_notifications", JSON.stringify(notifications));
        if(currentUser) localStorage.setItem("sc_currentUser", currentUser);
    }

    function addNotification(message) {
        notifications.unshift({ message, time: new Date().toLocaleString(), read: false });
        if(notifications.length > 50) notifications.pop();
        saveAll();
        updateNotificationUI();
    }

    function updateNotificationUI() {
        const badge = document.getElementById("notificationBadge");
        const unreadCount = notifications.filter(n => !n.read).length;
        if(unreadCount > 0) {
            badge.classList.remove("hidden");
            badge.textContent = unreadCount;
        } else {
            badge.classList.add("hidden");
        }
        const menu = document.getElementById("notificationMenu");
        if(menu) {
            if(notifications.length === 0) {
                menu.innerHTML = "<div class='notification-item'>📭 Нет уведомлений</div>";
            } else {
                menu.innerHTML = notifications.map(n => `<div class="notification-item">🔔 ${escapeHtml(n.message)}<br><small>${n.time}</small></div>`).join('');
            }
        }
    }

    function markNotificationsRead() {
        notifications.forEach(n => n.read = true);
        saveAll();
        updateNotificationUI();
    }

    function addApplicationAuto(name, bio, type, role, avatar, link) {
        if(!name.trim()) return false;
        const newEntry = {
            id: Date.now(), name, bio, type, role,
            avatar: avatar || "🐱", link: link || "#", acceptedAt: new Date().toISOString(), userId: currentUser
        };
        if(type === "проект") {
            projectsList.push(newEntry);
        } else {
            fameList.push(newEntry);
        }
        saveAll();
        return true;
    }

    function addApplicationPending(name, bio, type, role, avatar, link) {
        if(!name.trim()) return false;
        const newApp = {
            id: Date.now(), name, bio, type, role,
            avatar: avatar || "🐱", link: link || "#", timestamp: new Date().toLocaleString(), userId: currentUser, status: "pending"
        };
        applications.unshift(newApp);
        saveAll();
        return true;
    }

    function acceptApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx === -1) return false;
        const app = applications[idx];
        const entry = { ...app, acceptedAt: new Date().toISOString(), userId: app.userId };
        delete entry.timestamp;
        delete entry.status;
        if(app.type === "проект") {
            projectsList.push(entry);
        } else {
            fameList.push(entry);
        }
        applications.splice(idx,1);
        saveAll();
        if(app.userId && app.userId !== "cwazardbog") {
            addNotification(`Квазард принял вашу заявку "${app.name}" в фейм листе`);
        }
        return true;
    }

    function rejectApplication(id) {
        const idx = applications.findIndex(a => a.id == id);
        if(idx !== -1) {
            const app = applications[idx];
            applications.splice(idx,1);
            saveAll();
            if(app.userId && app.userId !== "cwazardbog") {
                addNotification(`Ваша заявка "${app.name}" была отклонена`);
            }
            return true;
        }
        return false;
    }

    function sortByRole(list) {
        return [...list].sort((a,b) => (roleOrder[a.role]||99) - (roleOrder[b.role]||99));
    }

    function showDetail(person) {
        const overlay = document.getElementById("detailOverlay");
        const detailAvatar = document.getElementById("detailAvatar");
        const detailName = document.getElementById("detailName");
        const detailRole = document.getElementById("detailRole");
        const detailLink = document.getElementById("detailLink");
        const detailBio = document.getElementById("detailBio");
        
        if(person.avatar && person.avatar.startsWith('data:')) {
            detailAvatar.style.backgroundImage = `url('${person.avatar}')`;
            detailAvatar.style.backgroundSize = "cover";
            detailAvatar.innerHTML = "";
        } else {
            detailAvatar.style.backgroundImage = "";
            detailAvatar.innerHTML = person.avatar || "🐱";
        }
        detailName.textContent = person.name;
        detailRole.textContent = person.role;
        detailLink.innerHTML = `<a href="${person.link}" target="_blank">${person.link.length > 50 ? person.link.substring(0,50)+'...' : person.link}</a>`;
        detailBio.textContent = person.bio || "—";
        
        overlay.classList.add("show");
    }

    function closeDetail() {
        const overlay = document.getElementById("detailOverlay");
        overlay.classList.remove("show");
    }

    function renderFame() {
        const cont = document.getElementById("fameListContainer");
        if(!cont) return;
        const sorted = sortByRole(fameList);
        if(!sorted.length) { cont.innerHTML = "<div class='empty-message'>😿 Пока никого нет</div>"; return; }
        cont.innerHTML = sorted.map(p => `
            <div class="person-card" data-id="${p.id}">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '🐱') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(p.name)}</div>
                    <div><span class="role-badge">${p.role}</span><span class="type-badge">👤 человек</span></div></div>
                </div>
                <p>📝 ${escapeHtml(p.bio?.substring(0,100) || '—')}</p>
                <p>🔗 <a href="${p.link}" target="_blank" style="color:#a78bfa;" onclick="event.stopPropagation();">${p.link.length>35?p.link.substring(0,35)+'...':p.link}</a></p>
            </div>`).join('');
        
        document.querySelectorAll("#fameListContainer .person-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if(e.target.tagName === 'A') return;
                const id = parseInt(card.dataset.id);
                const person = fameList.find(p => p.id === id);
                if(person) showDetail(person);
            });
        });
    }

    function renderProjects() {
        const cont = document.getElementById("projectsContainer");
        if(!cont) return;
        const sorted = sortByRole(projectsList);
        if(!sorted.length) { cont.innerHTML = "<div class='empty-message'>📭 Проектов пока нет</div>"; return; }
        cont.innerHTML = sorted.map(p => `
            <div class="person-card" data-id="${p.id}">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${p.avatar && p.avatar.startsWith('data:') ? p.avatar : ''}');">
                        ${(!p.avatar || !p.avatar.startsWith('data:')) ? (p.avatar || '📁') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(p.name)}</div>
                    <div><span class="role-badge">${p.role}</span><span class="type-badge">🚀 проект</span></div></div>
                </div>
                <p>📖 ${escapeHtml(p.bio?.substring(0,100) || '—')}</p>
                <p>🔗 <a href="${p.link}" target="_blank" style="color:#a78bfa;" onclick="event.stopPropagation();">Ссылка</a></p>
            </div>`).join('');
        
        document.querySelectorAll("#projectsContainer .person-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if(e.target.tagName === 'A') return;
                const id = parseInt(card.dataset.id);
                const project = projectsList.find(p => p.id === id);
                if(project) showDetail(project);
            });
        });
    }

    function renderAdmin() {
        const cont = document.getElementById("applicationsList");
        if(!cont) return;
        if(!applications.length) { cont.innerHTML = "<div class='empty-message'>✨ Нет заявок</div>"; return; }
        cont.innerHTML = applications.map(a => `
            <div class="person-card" data-id="${a.id}">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${a.avatar && a.avatar.startsWith('data:') ? a.avatar : ''}');">
                        ${(!a.avatar || !a.avatar.startsWith('data:')) ? (a.avatar || '🐾') : ''}
                    </div>
                    <div><div class="person-name">${escapeHtml(a.name)}</div>
                    <span class="role-badge">${a.role}</span><span class="type-badge">${a.type === 'проект' ? '🚀 проект' : '👤 человек'}</span>
                    <div class="status-pending">⏳ ожидает</div></div>
                </div>
                <p>📝 ${escapeHtml(a.bio)}</p>
                <div class="admin-actions" onclick="event.stopPropagation()">
                    <button class="accept-btn" data-id="${a.id}">✅ Принять</button>
                    <button class="reject-btn" data-id="${a.id}">❌ Отклонить</button>
                </div>
            </div>`).join('');
        document.querySelectorAll('.accept-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); if(acceptApplication(btn.dataset.id)) { renderAdmin(); renderFame(); renderProjects(); toast("Принято!"); } };
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); if(rejectApplication(btn.dataset.id)) { renderAdmin(); toast("Отклонено"); } };
        });
    }

    function renderMyApplications() {
        const container = document.getElementById("myApplicationsList");
        if(!container) return;
        const myPending = applications.filter(a => a.userId === currentUser);
        const myAccepted = [...fameList, ...projectsList].filter(a => a.userId === currentUser);
        if(myPending.length === 0 && myAccepted.length === 0) {
            container.innerHTML = "<div class='empty-message'>У вас нет заявок</div>";
            return;
        }
        let html = "";
        myPending.forEach(a => {
            html += `<div class="person-card" style="margin-bottom:0.8rem; cursor:default;">
                        <div class="person-header">
                            <div><div class="person-name">${escapeHtml(a.name)}</div>
                            <span class="role-badge">${a.role}</span>
                            <span class="status-badge status-pending">⏳ ожидает</span></div>
                        </div>
                     </div>`;
        });
        myAccepted.forEach(a => {
            html += `<div class="person-card" style="margin-bottom:0.8rem; cursor:default;">
                        <div class="person-header">
                            <div><div class="person-name">${escapeHtml(a.name)}</div>
                            <span class="role-badge">${a.role}</span>
                            <span class="status-badge status-accepted">✅ принят</span></div>
                        </div>
                     </div>`;
        });
        container.innerHTML = html;
    }

    function toast(msg) {
        let t = document.getElementById("toast");
        if(!t) { t = document.createElement("div"); t.id = "toast"; t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#8b5cf6;padding:12px 24px;border-radius:40px;z-index:9999;font-weight:bold"; document.body.appendChild(t); }
        t.innerText = msg; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 2000);
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showOwnerLogin() {
        const modal = document.createElement("div"); modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>🔐 Вход владельца</h3><input id="ownerUser" placeholder="Имя" style="margin:0.5rem 0;width:100%"><input id="ownerPass" type="password" placeholder="Пароль" style="margin:0.5rem 0;width:100%"><div style="display:flex;gap:1rem"><button id="loginOwnerBtn">Войти</button><button id="closeModalBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginOwnerBtn").onclick = () => {
            const u = document.getElementById("ownerUser").value;
            const p = document.getElementById("ownerPass").value;
            if(u === OWNER_USERNAME && p === OWNER_PASS) {
                isOwner = true;
                currentUser = OWNER_USERNAME;
                localStorage.setItem("sc_currentUser", currentUser);
                modal.remove();
                showTab("admin");
                renderAdmin();
                toast("Добро пожаловать, Квазард!");
                updateRoleSelect();
                updateOwnerButton();
            } else { toast("Неверные данные!"); modal.remove(); }
        };
        document.getElementById("closeModalBtn").onclick = () => modal.remove();
    }

    function updateRoleSelect() {
        const roleSelect = document.getElementById("role");
        if(!roleSelect) return;
        const options = Array.from(roleSelect.options).map(o => o.value);
        if(isOwner && !options.includes('владелец')) {
            const option = document.createElement("option");
            option.value = "владелец";
            option.textContent = "👑 владелец";
            roleSelect.appendChild(option);
        } else if(!isOwner && options.includes('владелец')) {
            for(let i = 0; i < roleSelect.options.length; i++) {
                if(roleSelect.options[i].value === "владелец") {
                    roleSelect.remove(i);
                    break;
                }
            }
        }
    }

    function updateOwnerButton() {
        const ownerBtn = document.getElementById("floatingOwnerBtn");
        if(isOwner) {
            ownerBtn.style.background = "linear-gradient(135deg, #10b981, #059669)";
            ownerBtn.innerHTML = "👑 Владелец (активен)";
        } else {
            ownerBtn.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
            ownerBtn.innerHTML = "👑 Владелец";
        }
    }

    let currentTab = "apply";
    function showTab(tab) {
        document.getElementById("applyTab").classList.add("hidden");
        document.getElementById("listTab").classList.add("hidden");
        document.getElementById("projectsTab").classList.add("hidden");
        document.getElementById("adminPanel").classList.add("hidden");
        if(tab === "apply") document.getElementById("applyTab").classList.remove("hidden");
        if(tab === "list") document.getElementById("listTab").classList.remove("hidden");
        if(tab === "projects") document.getElementById("projectsTab").classList.remove("hidden");
        if(tab === "admin" && isOwner) document.getElementById("adminPanel").classList.remove("hidden");
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        if(tab === "apply") document.querySelector("[data-tab='apply']").classList.add("active");
        if(tab === "list") document.querySelector("[data-tab='list']").classList.add("active");
        if(tab === "projects") document.querySelector("[data-tab='projects']").classList.add("active");
        currentTab = tab;
    }

    let currentAvatar = "";
    document.getElementById("uploadBtn").onclick = () => document.getElementById("avatarFile").click();
    document.getElementById("avatarFile").onchange = function(e) {
        const f = e.target.files[0];
        if(f && f.type.startsWith("image/")) {
            const r = new FileReader();
            r.onload = ev => { currentAvatar = ev.target.result; document.getElementById("avatarPreview").style.backgroundImage = `url('${currentAvatar}')`; document.getElementById("avatarPreview").style.backgroundSize = "cover"; document.getElementById("avatarPreview").innerHTML = ""; document.getElementById("avatarData").value = currentAvatar; };
            r.readAsDataURL(f);
        }
    };

    document.getElementById("applicationForm").onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const bio = document.getElementById("bio").value;
        const type = document.querySelector('input[name="type"]:checked').value;
        let role = document.getElementById("role").value;
        const avatar = document.getElementById("avatarData").value;
        const link = document.getElementById("link").value;
        if(!name.trim()) { toast("Введите имя"); return; }
        
        if(isOwner && role === "владелец") {
            if(addApplicationAuto(name, bio, type, role, avatar || "🐱", link)) {
                document.getElementById("applicationForm").reset();
                document.getElementById("avatarPreview").innerHTML = "🐱";
                document.getElementById("avatarPreview").style.backgroundImage = "";
                document.getElementById("avatarData").value = "";
                currentAvatar = "";
                renderFame();
                renderProjects();
                toast("✅ Заявка с ролью ВЛАДЕЛЕЦ автоматически принята!");
            } else toast("Ошибка");
        } else {
            if(addApplicationPending(name, bio, type, role, avatar || "🐱", link)) {
                document.getElementById("applicationForm").reset();
                document.getElementById("avatarPreview").innerHTML = "🐱";
                document.getElementById("avatarPreview").style.backgroundImage = "";
                document.getElementById("avatarData").value = "";
                currentAvatar = "";
                if(isOwner) renderAdmin();
                toast("✅ Заявка отправлена на рассмотрение!");
            } else toast("Ошибка");
        }
    };

    document.getElementById("ownerStartBtn").onclick = () => { showOwnerLogin(); };
    document.getElementById("guestStartBtn").onclick = () => {
        document.getElementById("startMenu").classList.add("hidden");
        document.getElementById("mainContent").classList.add("visible");
        loadData();
        renderFame();
        renderProjects();
        updateRoleSelect();
        updateOwnerButton();
    };
    document.getElementById("floatingOwnerBtn").onclick = () => { if(isOwner) { isOwner=false; currentUser=null; localStorage.removeItem("sc_currentUser"); showTab(currentTab); updateRoleSelect(); updateOwnerButton(); toast("Выход из режима владельца"); } else showOwnerLogin(); };
    document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { if(btn.dataset.tab === "admin" && !isOwner) { showOwnerLogin(); return; } showTab(btn.dataset.tab); };
    });
    document.getElementById("myAppsBtn").onclick = () => {
        if(!currentUser) { toast("Сначала подайте заявку, чтобы отслеживать её статус"); return; }
        renderMyApplications();
        document.getElementById("myApplicationsModal").classList.remove("hidden");
    };
    document.getElementById("closeMyAppsModal").onclick = () => document.getElementById("myApplicationsModal").classList.add("hidden");
    document.getElementById("closeDetailBtn").onclick = closeDetail;
    document.getElementById("detailOverlay").onclick = (e) => { if(e.target === document.getElementById("detailOverlay")) closeDetail(); };
    
    let bellTimeout;
    document.getElementById("notificationBell").onclick = () => {
        const menu = document.getElementById("notificationMenu");
        menu.classList.toggle("show");
        if(menu.classList.contains("show")) {
            markNotificationsRead();
            if(bellTimeout) clearTimeout(bellTimeout);
            bellTimeout = setTimeout(() => menu.classList.remove("show"), 5000);
        }
    };
    document.addEventListener("click", (e) => {
        if(!document.getElementById("notificationBell").contains(e.target) && !document.getElementById("notificationMenu").contains(e.target)) {
            document.getElementById("notificationMenu").classList.remove("show");
        }
    });

    loadData();
    updateRoleSelect();
    updateOwnerButton();
</script>
</body>
</html>
