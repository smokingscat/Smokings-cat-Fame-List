<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>smokings cat fame list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030c);
            color: #f0f0ff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .glass {
            background: rgba(15, 15, 35, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(120, 80, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
        }

        .sub {
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: rgba(20, 20, 45, 0.7);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            box-shadow: 0 0 12px #8b5cf6aa;
        }

        .owner-btn {
            background: #ff4d4d30;
            border: 1px solid #ff8c8c;
            color: #ffb3b3;
        }

        .form-card, .list-card, .admin-card {
            padding: 1.8rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5ff;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #4f46e5;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #c084fc;
            box-shadow: 0 0 10px #a855f7;
        }

        .file-label {
            display: inline-block;
            background: linear-gradient(95deg, #7c3aed, #3b82f6);
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .avatar-preview {
            margin-top: 0.8rem;
            width: 80px;
            height: 80px;
            border-radius: 100%;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background-size: cover;
            background-position: center;
            border: 2px solid #a855f7;
        }

        button {
            background: linear-gradient(95deg, #7c3aed, #3b82f6);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .role-badge {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: bold;
            background: #2d2d5e;
        }

        .fame-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .person-card {
            background: rgba(25, 25, 50, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1rem;
            border-left: 5px solid #a855f7;
        }

        .avatar-img {
            width: 70px;
            height: 70px;
            border-radius: 100%;
            background-size: cover;
            background-position: center;
            background-color: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .person-header {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.7rem;
        }

        .person-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .admin-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .accept-btn {
            background: #10b981;
        }

        .reject-btn {
            background: #ef4444;
        }

        .status-pending {
            color: #fbbf24;
            font-size: 0.8rem;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #14142b;
            padding: 2rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .owner-role-toggle {
            background: rgba(255, 77, 77, 0.2);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ff8c8c;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        @media (max-width: 680px) {
            h1 { font-size: 2rem; }
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐾 SMOKINGS CAT</h1>
        <div class="sub">fame list — твой путь к признанию</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="apply">📝 Подать заявку</button>
        <button class="tab-btn" data-tab="list">👥 Фейм лист (люди)</button>
        <button class="tab-btn" data-tab="projects">🚀 Фейм лист проектов</button>
        <button class="tab-btn owner-btn" id="ownerPanelBtn">👑 Владелец (заявки)</button>
    </div>

    <div id="applyTab" class="tab-content">
        <div class="form-card glass">
            <h2 style="margin-bottom: 1rem;">✨ Новая заявка</h2>
            <form id="applicationForm">
                <div class="form-group">
                    <label>Имя (никнейм) *</label>
                    <input type="text" id="name" required placeholder="например: Smokings Cat">
                </div>
                <div class="form-group">
                    <label>О себе</label>
                    <textarea id="bio" rows="3" placeholder="Расскажи о себе..."></textarea>
                </div>
                
                <!-- Блок для выбора роли (обычный) -->
                <div class="form-group" id="normalRoleGroup">
                    <label>Кто ты?</label>
                    <select id="role">
                        <option value="медийка">📸 медийка</option>
                        <option value="большой фейм">⭐ большой фейм</option>
                        <option value="средний фейм">🔥 средний фейм</option>
                        <option value="малый фейм">🐾 малый фейм</option>
                        <option value="кодер">💻 кодер</option>
                        <option value="эдитор">🎨 эдитор</option>
                    </select>
                </div>

                <!-- Скрытый блок для владельца -->
                <div id="ownerRoleBlock" class="owner-role-toggle hidden">
                    <label>🔐 Верификация владельца</label>
                    <input type="password" id="ownerKeyInput" placeholder="Введите мастер-пароль владельца">
                    <div style="font-size: 0.8rem; margin-top: 0.5rem; color: #ffb3b3;">Только для подачи заявки с ролью "владелец"</div>
                </div>

                <div class="form-group">
                    <button type="button" id="toggleOwnerModeBtn" style="background: #ff4d4d80;">👑 Хочу подать как владелец</button>
                </div>

                <div class="form-group">
                    <label>Аватар (загрузи с телефона)</label>
                    <input type="file" id="avatarFile" accept="image/*" style="display: none;">
                    <button type="button" class="file-label" id="uploadAvatarBtn">📸 Выбрать фото</button>
                    <div id="avatarPreview" class="avatar-preview">🐱</div>
                    <input type="hidden" id="avatarData" value="">
                </div>
                <div class="form-group">
                    <label>Ссылка на проект / Telegram</label>
                    <input type="text" id="link" placeholder="https://t.me/username">
                </div>
                <button type="submit">🚀 Отправить заявку</button>
            </form>
            <div id="applyMessage" style="margin-top: 1rem;"></div>
        </div>
    </div>

    <div id="listTab" class="tab-content hidden">
        <div class="list-card glass">
            <h2>👥 Фейм лист — люди</h2>
            <div id="fameListContainer" class="fame-grid"></div>
        </div>
    </div>

    <div id="projectsTab" class="tab-content hidden">
        <div class="list-card glass">
            <h2>🚀 Фейм лист проектов</h2>
            <div id="projectsContainer" class="fame-grid"></div>
        </div>
    </div>

    <div id="adminPanel" class="tab-content hidden">
        <div class="admin-card glass">
            <h2>📬 Заявки на рассмотрение</h2>
            <div id="applicationsList"></div>
        </div>
    </div>
    <footer>smokings cat fame list — 24/7 | роль владельца доступна только с мастер-паролем</footer>
</div>

<script>
    // ========== STORAGE ==========
    const STORAGE_APPLICATIONS = "smokings_applications";
    const STORAGE_FAMELIST = "smokings_famelist";
    const STORAGE_PROJECTS = "smokings_projects";
    const OWNER_PASSWORD = "smokings2026";  // Мастер-пароль владельца (вы можете изменить)

    let applications = [];
    let fameList = [];
    let projectsList = [];

    // Состояние: пытается ли пользователь подать как владелец
    let isOwnerModeRequest = false;

    // Порядок сортировки
    const roleOrder = {
        "владелец": 1,
        "медийка": 2,
        "большой фейм": 3,
        "средний фейм": 4,
        "малый фейм": 5,
        "кодер": 6,
        "эдитор": 7
    };

    function loadData() {
        const storedApps = localStorage.getItem(STORAGE_APPLICATIONS);
        applications = storedApps ? JSON.parse(storedApps) : [];

        const storedFame = localStorage.getItem(STORAGE_FAMELIST);
        fameList = storedFame ? JSON.parse(storedFame) : [];

        const storedProj = localStorage.getItem(STORAGE_PROJECTS);
        projectsList = storedProj ? JSON.parse(storedProj) : [];
    }

    function saveApplications() { localStorage.setItem(STORAGE_APPLICATIONS, JSON.stringify(applications)); }
    function saveFameList() { localStorage.setItem(STORAGE_FAMELIST, JSON.stringify(fameList)); }
    function saveProjects() { localStorage.setItem(STORAGE_PROJECTS, JSON.stringify(projectsList)); }

    function addApplication(name, bio, role, avatarData, link) {
        if(!name.trim()) return false;
        const newApp = {
            id: Date.now(),
            name: name.trim(),
            bio: bio.trim() || "—",
            role: role,
            avatar: avatarData || "🐱",
            link: link.trim() || "#",
            timestamp: new Date().toLocaleString()
        };
        applications.unshift(newApp);
        saveApplications();
        return true;
    }

    function acceptApplication(appId) {
        const index = applications.findIndex(app => app.id == appId);
        if(index === -1) return false;
        const app = applications[index];
        
        const fameEntry = {
            id: app.id,
            name: app.name,
            bio: app.bio,
            role: app.role,
            avatar: app.avatar,
            link: app.link,
            acceptedAt: new Date().toISOString()
        };
        fameList.push(fameEntry);
        saveFameList();

        const projectRoles = ["владелец", "медийка", "большой фейм", "средний фейм", "малый фейм"];
        if(projectRoles.includes(app.role)) {
            const projectEntry = {
                id: app.id,
                name: app.name,
                bio: app.bio,
                role: app.role,
                avatar: app.avatar,
                link: app.link
            };
            projectsList.push(projectEntry);
            saveProjects();
        }

        applications.splice(index, 1);
        saveApplications();
        return true;
    }

    function rejectApplication(appId) {
        const index = applications.findIndex(app => app.id == appId);
        if(index !== -1) {
            applications.splice(index, 1);
            saveApplications();
            return true;
        }
        return false;
    }

    function sortByRole(list) {
        return [...list].sort((a, b) => (roleOrder[a.role] || 99) - (roleOrder[b.role] || 99));
    }

    function renderFameList() {
        const container = document.getElementById("fameListContainer");
        if(!container) return;
        const sorted = sortByRole(fameList);
        if(sorted.length === 0) {
            container.innerHTML = `<div class="empty-message">😿 Пока никого нет. Стань первым!</div>`;
            return;
        }
        container.innerHTML = sorted.map(person => `
            <div class="person-card">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${person.avatar && person.avatar.startsWith('data:image') ? person.avatar : ''}'); background-size: cover;">
                        ${(!person.avatar || !person.avatar.startsWith('data:image')) ? (person.avatar || '🐱') : ''}
                    </div>
                    <div>
                        <div class="person-name">${escapeHtml(person.name)}</div>
                        <div class="role-badge">${person.role}</div>
                    </div>
                </div>
                <p>📝 ${escapeHtml(person.bio.substring(0, 120))}</p>
                <p>🔗 <a href="${person.link}" target="_blank" style="color:#a78bfa;">${person.link.length > 40 ? person.link.substring(0, 40) + '...' : person.link}</a></p>
            </div>
        `).join('');
    }

    function renderProjectsList() {
        const container = document.getElementById("projectsContainer");
        if(!container) return;
        const sorted = sortByRole(projectsList);
        if(sorted.length === 0) {
            container.innerHTML = `<div class="empty-message">📭 Проекты ещё не добавлены.</div>`;
            return;
        }
        container.innerHTML = sorted.map(proj => `
            <div class="person-card">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${proj.avatar && proj.avatar.startsWith('data:image') ? proj.avatar : ''}'); background-size: cover;">
                        ${(!proj.avatar || !proj.avatar.startsWith('data:image')) ? (proj.avatar || '📁') : ''}
                    </div>
                    <div>
                        <div class="person-name">${escapeHtml(proj.name)}</div>
                        <div class="role-badge">${proj.role}</div>
                    </div>
                </div>
                <p>📖 ${escapeHtml(proj.bio.substring(0, 120))}</p>
                <p>🔗 <a href="${proj.link}" target="_blank" style="color:#a78bfa;">Ссылка</a></p>
            </div>
        `).join('');
    }

    function renderAdminApplications() {
        const container = document.getElementById("applicationsList");
        if(!container) return;
        if(applications.length === 0) {
            container.innerHTML = `<div class="empty-message">✨ Новых заявок нет.</div>`;
            return;
        }
        container.innerHTML = applications.map(app => `
            <div class="person-card" style="margin-bottom: 1rem;">
                <div class="person-header">
                    <div class="avatar-img" style="background-image: url('${app.avatar && app.avatar.startsWith('data:image') ? app.avatar : ''}'); background-size: cover;">
                        ${(!app.avatar || !app.avatar.startsWith('data:image')) ? (app.avatar || '🐾') : ''}
                    </div>
                    <div>
                        <div class="person-name">${escapeHtml(app.name)}</div>
                        <div class="role-badge">${app.role}</div>
                        <div class="status-pending">⏳ ожидает</div>
                    </div>
                </div>
                <p>📝 ${escapeHtml(app.bio)}</p>
                <p>🔗 ${app.link}</p>
                <div class="admin-actions">
                    <button class="accept-btn" data-id="${app.id}">✅ Принять</button>
                    <button class="reject-btn" data-id="${app.id}">❌ Отклонить</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.accept-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if(acceptApplication(id)) {
                    renderAdminApplications();
                    renderFameList();
                    renderProjectsList();
                    showToast("Заявка принята!", "#10b981");
                } else showToast("Ошибка", "#ef4444");
            });
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if(rejectApplication(id)) {
                    renderAdminApplications();
                    showToast("Заявка отклонена", "#f59e0b");
                }
            });
        });
    }

    function showToast(msg, bg = "#3b82f6") {
        let toast = document.getElementById("dynamicToast");
        if(!toast) {
            toast = document.createElement("div");
            toast.id = "dynamicToast";
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = bg;
            toast.style.color = "white";
            toast.style.padding = "12px 24px";
            toast.style.borderRadius = "40px";
            toast.style.zIndex = "9999";
            toast.style.fontWeight = "bold";
            document.body.appendChild(toast);
        }
        toast.style.background = bg;
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => {
            toast.style.opacity = "0";
            setTimeout(() => toast.remove(), 500);
        }, 2000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Загрузка аватара
    let currentAvatarBase64 = "";
    document.getElementById("uploadAvatarBtn").addEventListener("click", () => {
        document.getElementById("avatarFile").click();
    });
    document.getElementById("avatarFile").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if(file && file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentAvatarBase64 = ev.target.result;
                const preview = document.getElementById("avatarPreview");
                preview.style.backgroundImage = `url('${currentAvatarBase64}')`;
                preview.style.backgroundSize = "cover";
                preview.innerHTML = "";
                document.getElementById("avatarData").value = currentAvatarBase64;
            };
            reader.readAsDataURL(file);
        } else if(file) {
            showToast("Выберите изображение", "#ef4444");
        }
    });

    // Переключение режима владельца
    const toggleBtn = document.getElementById("toggleOwnerModeBtn");
    const ownerRoleBlock = document.getElementById("ownerRoleBlock");
    const normalRoleGroup = document.getElementById("normalRoleGroup");
    const roleSelect = document.getElementById("role");

    toggleBtn.addEventListener("click", () => {
        isOwnerModeRequest = !isOwnerModeRequest;
        if(isOwnerModeRequest) {
            ownerRoleBlock.classList.remove("hidden");
            normalRoleGroup.classList.add("hidden");
            toggleBtn.style.background = "#ff4d4d";
            toggleBtn.innerText = "👑 Отменить подачу как владелец";
        } else {
            ownerRoleBlock.classList.add("hidden");
            normalRoleGroup.classList.remove("hidden");
            toggleBtn.style.background = "#ff4d4d80";
            toggleBtn.innerText = "👑 Хочу подать как владелец";
            document.getElementById("ownerKeyInput").value = "";
        }
    });

    // Обработка формы
    document.getElementById("applicationForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("name").value;
        const bio = document.getElementById("bio").value;
        const avatar = document.getElementById("avatarData").value;
        const link = document.getElementById("link").value;
        
        let selectedRole = "";
        
        if(isOwnerModeRequest) {
            const ownerKey = document.getElementById("ownerKeyInput").value;
            if(ownerKey !== OWNER_PASSWORD) {
                showToast("❌ Неверный мастер-пароль! Роль владельца недоступна.", "#ef4444");
                return;
            }
            selectedRole = "владелец";
        } else {
            selectedRole = roleSelect.value;
        }
        
        if(!name.trim()) {
            showToast("Укажите имя!", "#ef4444");
            return;
        }
        
        if(addApplication(name, bio, selectedRole, avatar || "🐱", link)) {
            document.getElementById("applicationForm").reset();
            document.getElementById("avatarPreview").innerHTML = "🐱";
            document.getElementById("avatarPreview").style.backgroundImage = "";
            document.getElementById("avatarData").value = "";
            currentAvatarBase64 = "";
            // Сброс режима владельца
            if(isOwnerModeRequest) {
                isOwnerModeRequest = false;
                ownerRoleBlock.classList.add("hidden");
                normalRoleGroup.classList.remove("hidden");
                toggleBtn.style.background = "#ff4d4d80";
                toggleBtn.innerText = "👑 Хочу подать как владелец";
                document.getElementById("ownerKeyInput").value = "";
            }
            showToast("✅ Заявка отправлена владельцу!", "#10b981");
        } else showToast("Ошибка", "#ef4444");
    });

    // Панель владельца
    let isOwnerModeActive = false;
    function promptOwnerPassword() {
        const modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3>🔐 Вход владельца</h3>
                <input type="password" id="ownerPassInput" placeholder="пароль" style="margin: 1rem 0; width:100%;">
                <div style="display:flex; gap:1rem; justify-content:center;">
                    <button id="submitOwnerPass">Войти</button>
                    <button id="closeOwnerModal">Закрыть</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const input = modalDiv.querySelector("#ownerPassInput");
        const submitBtn = modalDiv.querySelector("#submitOwnerPass");
        const closeBtn = modalDiv.querySelector("#closeOwnerModal");
        const checkPass = () => {
            if(input.value === OWNER_PASSWORD) {
                isOwnerModeActive = true;
                modalDiv.remove();
                showTab("admin", true);
                renderAdminApplications();
                showToast("Добро пожаловать, владелец!", "#8b5cf6");
            } else {
                showToast("Неверный пароль", "#ef4444");
                modalDiv.remove();
                isOwnerModeActive = false;
                showTab(currentTab);
            }
        };
        submitBtn.onclick = checkPass;
        closeBtn.onclick = () => modalDiv.remove();
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") checkPass(); });
    }

    let currentTab = "apply";
    function showTab(tabId, adminMode = false) {
        document.getElementById("applyTab").classList.add("hidden");
        document.getElementById("listTab").classList.add("hidden");
        document.getElementById("projectsTab").classList.add("hidden");
        document.getElementById("adminPanel").classList.add("hidden");
        if(tabId === "apply") document.getElementById("applyTab").classList.remove("hidden");
        if(tabId === "list") document.getElementById("listTab").classList.remove("hidden");
        if(tabId === "projects") document.getElementById("projectsTab").classList.remove("hidden");
        if(tabId === "admin" && adminMode) document.getElementById("adminPanel").classList.remove("hidden");
        
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        if(tabId === "apply") document.querySelector("[data-tab='apply']").classList.add("active");
        if(tabId === "list") document.querySelector("[data-tab='list']").classList.add("active");
        if(tabId === "projects") document.querySelector("[data-tab='projects']").classList.add("active");
        if(tabId === "admin" && adminMode) document.getElementById("ownerPanelBtn").classList.add("active");
        else if(!adminMode) document.getElementById("ownerPanelBtn").classList.remove("active");
    }

    document.getElementById("ownerPanelBtn").addEventListener("click", () => {
        if(isOwnerModeActive) {
            isOwnerModeActive = false;
            showTab(currentTab);
            showToast("Выход из панели владельца", "#6b7280");
        } else promptOwnerPassword();
    });

    document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.addEventListener("click", (e) => {
            const tab = btn.dataset.tab;
            if(tab === "apply") { currentTab = "apply"; showTab("apply"); if(isOwnerModeActive) isOwnerModeActive = false; }
            else if(tab === "list") { currentTab = "list"; showTab("list"); if(isOwnerModeActive) isOwnerModeActive = false; }
            else if(tab === "projects") { currentTab = "projects"; showTab("projects"); if(isOwnerModeActive) isOwnerModeActive = false; }
        });
    });

    loadData();
    renderFameList();
    renderProjectsList();
    showTab("apply");
</script>
</body>
</html>
